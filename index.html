<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KALP 3D Printings — Product Catalogue</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--caramel:#2E1F26;--raisin:#C87740;--cream:#F5ECD7;--warm:#E8D5B5;--muted:#8B6E5A;--light:#FBF6EE;--border:#D4B896;--radius:14px;--shadow:0 4px 24px rgba(46,31,38,0.13)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--light);color:var(--caramel);font-family:Cambria,'Palatino Linotype',Georgia,serif;min-height:100vh;overflow-x:hidden}

/* SPLASH */
#splash{position:fixed;inset:0;background:#2E1F26;display:flex;align-items:center;justify-content:center;z-index:9999;overflow:hidden}
#splash::before{content:'';position:absolute;inset:-50%;background:radial-gradient(circle at 20% 30%,rgba(200,119,64,0.18) 0%,transparent 50%),radial-gradient(circle at 80% 70%,rgba(200,119,64,0.12) 0%,transparent 50%);animation:splashBg 4s ease-in-out infinite alternate}
@keyframes splashBg{from{transform:scale(1) rotate(0deg)}to{transform:scale(1.1) rotate(3deg)}}
#splash-inner{display:flex;flex-direction:column;align-items:center;gap:14px;position:relative;z-index:1}
#splash-ring{position:absolute;width:280px;height:280px;border-radius:50%;border:2px solid rgba(200,119,64,0.3);top:50%;left:50%;transform:translate(-50%,-50%) scale(0);animation:ringExpand 1.2s cubic-bezier(.34,1.56,.64,1) 0.3s forwards;box-shadow:0 0 40px rgba(200,119,64,0.2)}
#splash-ring::after{content:'';position:absolute;inset:12px;border-radius:50%;border:1px solid rgba(200,119,64,0.15)}
@keyframes ringExpand{from{transform:translate(-50%,-50%) scale(0);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}
#splash-logo{width:240px;height:auto;opacity:0;filter:invert(1) sepia(1) saturate(2) hue-rotate(340deg) brightness(1.2);animation:logoReveal 1s ease 0.6s forwards;transform:scale(0.7) translateY(20px)}
@keyframes logoReveal{from{opacity:0;transform:scale(0.7) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
#splash-tagline{font-family:Cambria,serif;font-size:1.1rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:#C87740;opacity:0;animation:fadeUp 0.8s ease 1.2s forwards}
#splash-sub{font-family:Cambria,serif;font-size:0.78rem;letter-spacing:0.22em;color:rgba(245,236,215,0.5);opacity:0;animation:fadeUp 0.8s ease 1.5s forwards}
#splash-services{font-family:Cambria,serif;font-size:0.72rem;letter-spacing:0.12em;color:rgba(200,119,64,0.65);opacity:0;animation:fadeUp 0.8s ease 1.8s forwards;border-top:1px solid rgba(200,119,64,0.2);padding-top:10px;text-align:center}
#splash-hint{font-family:Cambria,serif;font-size:0.82rem;color:rgba(200,119,64,0.7);opacity:0;margin-top:8px;animation:fadeUp 0.8s ease 2s forwards,pulse 2s ease 3s infinite}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:0.7;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}
#splash.exiting{animation:splashExit 0.9s cubic-bezier(.4,0,.2,1) forwards}
@keyframes splashExit{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.06);pointer-events:none}}
body.no-scroll{overflow:hidden}

/* TOPBAR */
.topbar{height:5px;background:linear-gradient(90deg,var(--caramel),var(--raisin),var(--caramel))}

/* HEADER */
header{background:var(--caramel);padding:0.9rem 2rem;display:flex;align-items:center;justify-content:center;border-bottom:1px solid rgba(200,119,64,0.2);position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(46,31,38,0.35)}
.logo-wrap img{height:60px;width:auto;filter:invert(1) sepia(1) saturate(2) hue-rotate(340deg) brightness(1.1);transition:transform 0.3s ease}
.logo-wrap img:hover{transform:scale(1.04)}

/* HERO */
.hero{background:var(--caramel);padding:3.5rem 2rem 3rem;text-align:center;position:relative;overflow:hidden;border-bottom:1px solid rgba(200,119,64,0.2)}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 100%,rgba(200,119,64,0.25) 0%,transparent 70%);pointer-events:none}
#hero-watermark{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;overflow:hidden;z-index:0;opacity:0;transition:opacity 1.2s ease}
#hero-watermark.visible{opacity:1}
#hero-watermark img{width:80%;max-width:520px;height:auto;filter:invert(1) sepia(1) saturate(0.4) hue-rotate(340deg) brightness(0.4) opacity(0.12);transform:scale(1.1)}
.hero>*:not(#hero-watermark){position:relative;z-index:1}
.hero-ornament{font-size:1.2rem;color:var(--raisin);letter-spacing:0.3em;margin-bottom:0.75rem;opacity:0.7}
.hero h1{font-family:Cambria,serif;font-size:clamp(1.8rem,5vw,3rem);font-weight:700;color:var(--cream);letter-spacing:-0.01em;line-height:1.2;margin-bottom:0.75rem}
.hero h1 span{color:var(--raisin)}
.hero p{font-size:1rem;color:var(--warm);max-width:500px;margin:0 auto;line-height:1.7;font-style:italic}
.hero-divider{width:80px;height:2px;background:linear-gradient(90deg,transparent,var(--raisin),transparent);margin:1.5rem auto 0}
.hero-stats{display:flex;justify-content:center;gap:3rem;margin-top:2rem;flex-wrap:wrap}
.stat{text-align:center}
.stat-num{font-family:Cambria,serif;font-size:1.8rem;font-weight:700;color:var(--raisin)}
.stat-label{font-size:0.72rem;color:var(--warm);margin-top:2px;letter-spacing:0.1em;text-transform:uppercase}

/* CONTROLS */
.controls{padding:1.25rem 2rem;display:flex;gap:12px;flex-wrap:wrap;align-items:center;background:var(--cream);border-bottom:1px solid var(--border)}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:340px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
#search{width:100%;background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);color:var(--caramel);font-family:Cambria,serif;font-size:0.9rem;padding:10px 14px 10px 38px;outline:none;transition:border-color 0.2s,box-shadow 0.2s}
#search:focus{border-color:var(--raisin);box-shadow:0 0 0 3px rgba(200,119,64,0.15)}
#search::placeholder{color:var(--muted);font-style:italic}
.sort-select{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);color:var(--caramel);font-family:Cambria,serif;font-size:0.85rem;padding:10px 14px;outline:none;cursor:pointer;transition:border-color 0.2s}
.sort-select:focus{border-color:var(--raisin)}

/* CAT PILLS */
.cat-pills{display:flex;gap:8px;flex-wrap:wrap;padding:1rem 2rem;background:var(--cream);border-bottom:1px solid var(--border)}
.pill{font-family:Cambria,serif;font-size:0.82rem;font-weight:600;padding:6px 18px;border-radius:99px;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.22s;white-space:nowrap;letter-spacing:0.03em}
.pill:hover{border-color:var(--raisin);color:var(--raisin);background:rgba(200,119,64,0.07)}
.pill.active{background:var(--raisin);border-color:var(--raisin);color:#fff}

/* GRID */
.grid-wrap{padding:2rem;background:var(--light)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:24px}

/* CARD */
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow);transition:transform 0.28s cubic-bezier(.34,1.56,.64,1),box-shadow 0.28s,border-color 0.28s;animation:fadeUp 0.45s ease both;cursor:pointer}
.card:hover{transform:translateY(-7px) scale(1.01);box-shadow:0 12px 40px rgba(46,31,38,0.18);border-color:var(--raisin)}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
.card-img{width:100%;aspect-ratio:4/3;background:var(--cream);overflow:hidden;position:relative;border-bottom:1px solid var(--border)}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform 0.5s cubic-bezier(.25,.46,.45,.94)}
.card:hover .card-img img{transform:scale(1.08)}
.cat-tag{position:absolute;top:10px;left:10px;font-family:Cambria,serif;font-size:0.68rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;padding:3px 10px;border-radius:99px;background:rgba(46,31,38,0.82);color:var(--raisin);border:1px solid rgba(200,119,64,0.4);backdrop-filter:blur(4px)}
.zoom-hint{position:absolute;bottom:10px;right:10px;background:rgba(46,31,38,0.75);color:var(--cream);font-size:0.65rem;padding:3px 8px;border-radius:99px;opacity:0;transition:opacity 0.2s;font-family:Cambria,serif;letter-spacing:0.05em;backdrop-filter:blur(4px)}
.card:hover .zoom-hint{opacity:1}
.card-body{padding:1rem 1.2rem 1.2rem;flex:1;display:flex;flex-direction:column;gap:5px}
.card-name{font-family:Cambria,serif;font-size:1.05rem;font-weight:700;color:var(--caramel);line-height:1.3}
.card-weight{font-size:0.78rem;color:var(--muted);display:flex;align-items:center;gap:4px;margin-top:2px;font-style:italic}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.price{font-family:Cambria,serif;font-size:1.25rem;font-weight:700;color:var(--raisin)}
.price-sub{font-size:0.67rem;color:var(--muted);display:block;margin-top:-2px;font-style:italic}
.order-btn{display:flex;align-items:center;gap:5px;font-family:Cambria,serif;font-size:0.75rem;font-weight:700;color:#fff;background:var(--caramel);border-radius:99px;padding:7px 15px;text-decoration:none;transition:background 0.2s,transform 0.2s,box-shadow 0.2s;letter-spacing:0.03em;white-space:nowrap;box-shadow:0 2px 8px rgba(46,31,38,0.2)}
.order-btn:hover{background:var(--raisin);transform:translateY(-1px);box-shadow:0 4px 14px rgba(200,119,64,0.35)}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;z-index:1000;background:rgba(46,31,38,0.92);backdrop-filter:blur(8px);align-items:center;justify-content:center;animation:lbFadeIn 0.25s ease;padding:1rem}
.lightbox.open{display:flex}
@keyframes lbFadeIn{from{opacity:0}to{opacity:1}}
.lb-content{position:relative;max-width:90vw;max-height:90vh;animation:lbZoomIn 0.3s cubic-bezier(.34,1.56,.64,1)}
@keyframes lbZoomIn{from{transform:scale(0.85);opacity:0}to{transform:scale(1);opacity:1}}
.lb-content img{max-width:90vw;max-height:80vh;object-fit:contain;border-radius:var(--radius);box-shadow:0 24px 80px rgba(0,0,0,0.5);border:2px solid rgba(200,119,64,0.3);display:block}
.lb-info{text-align:center;margin-top:1rem;color:var(--cream)}
.lb-name{font-family:Cambria,serif;font-size:1.2rem;font-weight:700;color:var(--raisin);margin-bottom:4px}
.lb-price{font-size:1rem;color:var(--warm);font-style:italic}
.lb-close{position:absolute;top:-14px;right:-14px;width:36px;height:36px;border-radius:50%;background:var(--raisin);color:#fff;border:none;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,0.3);transition:background 0.2s,transform 0.2s}
.lb-close:hover{background:var(--caramel);transform:rotate(90deg)}
.lb-order{display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-family:Cambria,serif;font-size:0.85rem;font-weight:700;color:#fff;background:#25d366;border-radius:99px;padding:8px 22px;text-decoration:none;transition:background 0.2s,transform 0.2s;box-shadow:0 2px 10px rgba(37,211,102,0.3)}
.lb-order:hover{background:#1da851;transform:translateY(-1px)}

/* LOADING / EMPTY / ERROR */
.state-box{grid-column:1/-1;text-align:center;padding:4rem 2rem;color:var(--muted)}
.state-box h3{font-family:Cambria,serif;font-size:1.2rem;color:var(--caramel);margin-bottom:8px}
.state-box p{font-size:0.9rem;line-height:1.6}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--raisin);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}

/* FOOTER */
footer{background:var(--caramel);padding:2.5rem 2rem;text-align:center;margin-top:2rem}
footer p{font-family:Cambria,serif;font-size:0.85rem;color:var(--warm);line-height:2.4}
footer strong{color:var(--raisin);font-size:1rem}
footer a{color:var(--raisin);text-decoration:none}
footer a:hover{text-decoration:underline}
.footer-divider{width:60px;height:1px;background:var(--raisin);margin:1rem auto;opacity:0.5}
.footer-btns{display:flex;justify-content:center;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:1.5rem}
.wa-btn{display:flex;align-items:center;gap:8px;font-family:Cambria,serif;font-size:0.95rem;font-weight:700;color:#fff;background:#25d366;border-radius:99px;padding:11px 26px;text-decoration:none;box-shadow:0 3px 12px rgba(37,211,102,0.35);transition:transform 0.2s,background 0.2s}
.wa-btn:hover{background:#1da851;transform:translateY(-1px)}
.insta-btn{display:flex;align-items:center;gap:8px;font-family:Cambria,serif;font-size:0.95rem;font-weight:700;color:#fff;background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);border-radius:99px;padding:11px 26px;text-decoration:none;box-shadow:0 3px 12px rgba(220,39,67,0.3);transition:transform 0.2s,opacity 0.2s}
.insta-btn:hover{opacity:0.88;transform:translateY(-1px)}
.map-circle-btn{display:flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:50%;background:var(--raisin);color:#fff;text-decoration:none;box-shadow:0 3px 12px rgba(200,119,64,0.4);transition:transform 0.2s,opacity 0.2s;flex-shrink:0}
.map-circle-btn:hover{opacity:0.85;transform:translateY(-2px)}

@media(max-width:600px){header{padding:0.9rem 1rem}.logo-wrap img{height:48px}.hero{padding:2.5rem 1rem 2rem}.controls,.cat-pills{padding:1rem}.grid-wrap{padding:1rem}.grid{grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:14px}.hero-stats{gap:1.5rem}}

/* MAP SECTION */
.map-section { background: var(--light); }
.map-header {
  background: var(--caramel);
  padding: 2.5rem 2rem 2rem;
  text-align: center;
}
.map-ornament { font-size:1rem; color:var(--raisin); letter-spacing:0.3em; margin-bottom:0.5rem; opacity:0.7; }
.map-header h2 {
  font-family: Cambria, serif;
  font-size: clamp(1.4rem, 4vw, 2rem);
  font-weight: 700;
  color: var(--cream);
  margin-bottom: 0.5rem;
}
.map-header p { font-size:0.9rem; color:var(--warm); font-style:italic; }
.map-header-inner { max-width: 500px; margin: 0 auto; }
.map-container {
  position: relative;
  border-top: 3px solid var(--raisin);
}
.map-container iframe {
  display: block;
  filter: sepia(0.2) saturate(0.9);
}
.map-info-card {
  position: absolute;
  bottom: 20px;
  left: 20px;
  background: var(--caramel);
  border: 1px solid rgba(200,119,64,0.3);
  border-radius: var(--radius);
  padding: 1rem 1.2rem;
  display: flex;
  gap: 10px;
  align-items: flex-start;
  box-shadow: 0 4px 24px rgba(46,31,38,0.4);
  max-width: 280px;
  animation: fadeUp 0.5s ease both;
}
.map-info-icon { font-size: 1.5rem; flex-shrink: 0; }
.map-info-name {
  font-family: Cambria, serif;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--raisin);
  margin-bottom: 4px;
}
.map-info-addr {
  font-family: Cambria, serif;
  font-size: 0.75rem;
  color: var(--warm);
  line-height: 1.6;
  margin-bottom: 10px;
}
.map-info-links { display: flex; gap: 8px; flex-wrap: wrap; }
.map-directions-btn, .map-wa-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: Cambria, serif;
  font-size: 0.72rem;
  font-weight: 700;
  padding: 5px 12px;
  border-radius: 99px;
  text-decoration: none;
  transition: opacity 0.2s, transform 0.2s;
  white-space: nowrap;
}
.map-directions-btn {
  background: var(--raisin);
  color: #fff;
}
.map-wa-btn {
  background: #25d366;
  color: #fff;
}
.map-directions-btn:hover, .map-wa-btn:hover {
  opacity: 0.85;
  transform: translateY(-1px);
}
@media(max-width:600px) {
  .map-info-card {
    position: static;
    margin: 0;
    max-width: 100%;
    border-radius: 0;
    border-left: none;
    border-right: none;
  }
}

</style>
</head>
